<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<div class="container py-3">
    <h1 class="mb-4">📋 Painel de Pedidos</h1>
    <div class="row">
        {{range .pedidos}}
        <div class="col-12 col-md-4 mb-3">
            <div class="card {{if not .Pago}}border-danger shadow{{else}}border-success shadow-sm{{end}}">
                <div class="card-body">
                    <h5 class="card-title">{{.Cliente}}</h5>
                    <p class="card-text mb-1">📦 {{.Tamanho}} | 💰 R$ {{.Valor}}</p>
                    <p class="badge {{if eq .Status "Preparando"}}bg-warning{{else if eq .Status "Enviando"}}bg-primary{{else}}bg-success{{end}}">
                        {{.Status}}
                    </p>
                    {{if not .Pago}}<p class="text-danger fw-bold small">🛑 FIADO / NÃO PAGO</p>{{end}}
                    <hr>
                    <div class="d-flex flex-wrap gap-2">
                        <form action="/update/{{.ID}}" method="POST" class="d-flex gap-1">
                            <select name="status" class="form-select form-select-sm">
                                <option value="Preparando">Preparando</option>
                                <option value="Enviando">A Caminho</option>
                                <option value="Entregue">Entregue</option>
                            </select>
                            <button class="btn btn-sm btn-dark">Ok</button>
                        </form>
                        {{if not .Pago}}
                        <form action="/pagar/{{.ID}}" method="POST">
                            <button class="btn btn-sm btn-success">Pago</button>
                        </form>
                        {{end}}
                        <form action="/delete/{{.ID}}" method="POST">
                            <button class="btn btn-sm btn-outline-danger">X</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
        {{end}}
    </div>
</div>
