<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acompanhar Pedido - Marmita Express</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { 
            background-color: #f4f7f6; 
            font-family: 'Poppins', sans-serif;
        }
        .status-container {
            max-width: 500px;
            margin: 50px auto;
            padding: 20px;
        }
        .card-status {
            border: none;
            border-radius: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            background: white;
            overflow: hidden;
        }
        .header-status {
            background: #0d6efd;
            color: white;
            padding: 30px;
            text-align: center;
        }
        .status-icon {
            font-size: 4rem;
            margin-bottom: 10px;
        }
        .progress {
            height: 12px;
            border-radius: 10px;
            background-color: #e9ecef;

        }
        .status-text {
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .info-pedido {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 15px;
        }
    </style>
</head>
<body>

<div class="container status-container">
    <div class="card card-status">
        <div class="header-status">
            <div class="status-icon">
                {{if eq .Status "Preparando"}}👨‍🍳{{else if eq .Status "Enviando"}}🛵{{else}}✅{{end}}
            </div>
            <h2 class="mb-0">Olá, {{.Cliente}}!</h2>
        </div>
        
        <div class="card-body p-4 text-center">
            <p class="text-muted">Status do seu pedido:</p>
            <h3 class="status-text {{if eq .Status "Preparando"}}text-warning{{else if eq .Status "Enviando"}}text-primary{{else}}text-success{{end}} mb-4">
                {{.Status}}
            </h3>

            <div class="progress mb-4">
                <div class="progress-bar progress-bar-striped progress-bar-animated 
                    {{if eq .Status "Preparando"}}bg-warning{{else if eq .Status "Enviando"}}bg-primary{{else}}bg-success{{end}}" 
                    role="progressbar" 
                    style="width: {{if eq .Status "Preparando"}}35%{{else if eq .Status "Enviando"}}70%{{else}}100%{{end}}">
                </div>
            </div>

            <div class="info-pedido mb-4 text-start">
                <p class="mb-1"><strong>Pedido:</strong> Marmita {{.Tamanho}}</p>
                <p class="mb-0 text-secondary small">O status é atualizado em tempo real pelo restaurante.</p>
            </div>

            <div class="d-grid">
                <button class="btn btn-outline-secondary btn-sm" onclick="location.reload()">
                    🔄 Atualizar Status Manualmente
                </button>
            </div>
        </div>
    </div>
    
    <p class="text-center mt-4 text-muted small">
        A página atualiza automaticamente a cada 20 segundos.
    </p>
</div>

<script>
    setTimeout(function(){
        location.reload();
    }, 20000); // 20 segundos
</script>

</body>
</html>
